<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Retail Portal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

  {% include "navbar.html" %}

  {% if messages %}
  <div class="max-w-7xl mx-auto px-4 mt-4 space-y-2">
    {% for message in messages %}
    <div class="px-4 py-3 rounded text-sm font-medium
      {% if message.tags == 'error' %}bg-red-100 text-red-700
      {% elif message.tags == 'success' %}bg-green-100 text-green-700
      {% else %}bg-blue-100 text-blue-700{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="flex-1 max-w-7xl mx-auto px-4 py-6 w-full">
    {% block breadcrumb %}{% endblock %}
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}
  {% load static %}
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
